name: Update Papers & Deploy

on:
  # Fallback: runs on GitHub when Mac is off (06:00 UTC = 14:00 Beijing)
  # Offset 4 hours from local launchd (10:00 BJ) to avoid collision
  schedule:
    - cron: '0 6 * * *'
  # Triggered automatically when data or app code changes
  push:
    branches: [main]
    paths:
      - 'data/articles.json'
      - 'data/processed-ids.json'
      - 'data/daily/**'
      - 'data/podcasts.json'
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.*'
  # Manual trigger
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: 'Run fetch+translate pipeline (set false to build only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # On schedule: skip pipeline if local already ran within 12 hours
      - name: Check if pipeline already ran today (schedule only)
        id: freshness
        if: github.event_name == 'schedule'
        run: |
          LAST_RUN=$(node -e "
            try {
              const s = require('./data/sources.json');
              const ms = Date.now() - new Date(s.lastRunAt).getTime();
              console.log(ms < 12 * 3600 * 1000 ? 'fresh' : 'stale');
            } catch { console.log('stale'); }
          ")
          echo "status=$LAST_RUN" >> $GITHUB_OUTPUT
          echo "[freshness] lastRunAt status: $LAST_RUN"

      # Run pipeline only when: (a) schedule + stale, or (b) manual request
      - name: Run fetch + translate pipeline
        if: >
          (github.event_name == 'schedule' && steps.freshness.outputs.status == 'stale') ||
          github.event.inputs.run_pipeline == 'true'
        env:
          # DeepSeek first (matches local). Empty if secret unset → falls back to
          # ANTHROPIC. Add DEEPSEEK_API_KEY in repo Settings → Secrets to use DeepSeek on cloud runs.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline.js

      - name: Run podcast pipeline
        if: >
          (github.event_name == 'schedule' && steps.freshness.outputs.status == 'stale') ||
          github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/podcast-pipeline.js

      - name: Commit updated data (schedule only, when pipeline ran)
        if: github.event_name == 'schedule' && steps.freshness.outputs.status == 'stale'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/ || (
            git add data/articles.json data/processed-ids.json data/sources.json data/daily/ data/podcasts.json
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          )

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Next.js
        run: npx next build --webpack
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
