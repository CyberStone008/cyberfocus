name: Update Papers & Deploy

on:
  # Fallback: runs on GitHub when Mac is off (02:00 UTC = 10:00 Beijing)
  schedule:
    - cron: '0 2 * * *'
  # Triggered automatically when local pipeline pushes updated data
  push:
    branches: [main]
    paths:
      - 'data/articles.json'
      - 'data/processed-ids.json'
      - 'data/daily/**'
  # Manual trigger
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: 'Run fetch+translate pipeline (set false to build only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run pipeline only on schedule (Mac off) or manual request
      - name: Run fetch + translate pipeline
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline.js

      - name: Commit updated data (schedule only)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/ || (
            git add data/articles.json data/processed-ids.json data/sources.json data/daily/
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          )

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Next.js
        run: npx next build --webpack
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
