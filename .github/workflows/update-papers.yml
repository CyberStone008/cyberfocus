name: Update Papers & Deploy

on:
  # 云端是唯一跑批者（本地 launchd 已停用）。白天每 3 小时抓一次。北京 = UTC+8。
  # GitHub 定时常漂移 1~2.5h、偶尔丢批，所以晨跑「提前 + 双批兜底」，确保 8 点前就绪：
  #   即便主批漂 +2h 也在 06:00 前跑完；主批被丢弃还有 05:00 那批补上。
  schedule:
    - cron: '0 20 * * *'            # 04:00 北京 — 晨跑主批（提前，留足 cron 漂移余量）
    - cron: '0 21 * * *'            # 05:00 北京 — 晨跑兜底（主批被丢弃/严重延迟时补上）
    - cron: '12 1,4,7,10,13 * * *'  # 09:12/12:12/15:12/18:12/21:12 北京 — 日内每 3 小时补抓
  # Triggered automatically when data or app code changes
  push:
    branches: [main]
    paths:
      - 'data/articles.json'
      - 'data/processed-ids.json'
      - 'data/daily/**'
      - 'data/podcasts.json'
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.*'
  # Manual trigger
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: 'Run fetch+translate pipeline (set false to build only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 每个定时批次都抓取（去重靠 processed-ids；下面只在有新内容时才提交+构建）。
      - name: Run fetch + translate pipeline
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          # DeepSeek 优先（需仓库 Secret DEEPSEEK_API_KEY），未配则退回 ANTHROPIC。
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline.js

      - name: Run podcast pipeline
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/podcast-pipeline.js || true

      # 4 个投资报告（脚本自身按节奏 gate：策略快报每2天 / 周报周六 / 季度宏观季首 / 行业深度月首）
      - name: Run investing reports (self-gated)
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/strategy-brief.js  || true
          node scripts/weekly-review.js   || true
          node scripts/quarterly-macro.js || true
          node scripts/sector-deep-dive.js || true

      # 新闻卡片「结论先行」说明：每批限量抓原文正文再生成(守溯源铁律)。
      # 脚本"最近优先+无tldr+可抓才生成"，自然先覆盖本批新抓的新闻，并渐进回填旧的。
      # 抓不到正文的(Google News跳转/付费墙)自动跳过，卡片退回只显示标题。
      - name: Run news TL;DR (capped)
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX: '25'
        run: node scripts/backfill-news-tldr.js || true

      # 运行期健康哨兵——搭车体检（C2 源健康 / C3 官网防烂 / C5 产出体检 / C6 tldr 覆盖率）。
      # 必须放在 Commit 之前：哨兵落盘的 data/health/ 随本批一起提交。
      # continue-on-error：哨兵自身故障绝不拖垮跑批/构建/部署。告警当日去重，详见 AGENTS.md〈运行期哨兵〉。
      - name: 健康哨兵（搭车体检）
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        continue-on-error: true
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sentinel.js --trigger=piggyback

      # 只在有新内容时提交+推送（→ Vercel 自动部署）。committed 输出决定下面要不要构建 Pages。
      # 手动触发(run_pipeline=true)也提交，否则抓到的数据被丢弃、Vercel 收不到。
      # 哨兵的 data/health/ 随同一提交落库，但「是否构建/📰通知」只看 data/health 之外的内容变化——
      # 哨兵每批都写 state/runs，若计入会让空批也构建（这正是要避免的）。Bark 语义不变。
      - name: Commit updated data
        id: commit
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/processed-ids.json data/sources.json data/daily/ data/podcasts.json data/strategy-briefs/ data/weekly-reports/ data/sector-reports/ data/macro-reports/ data/health/
          if git diff --cached --quiet; then
            echo "[commit] 无任何变更，跳过提交与构建"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            # 内容是否变化（排除 data/health）决定 committed → 构建 Pages + 📰 Bark
            if git diff --cached --quiet -- ':(exclude)data/health' .; then
              CONTENT=false
            else
              CONTENT=true
            fi
            git commit -m "chore: update $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            # 跑批期间 main 可能被其它提交推进（手动推送 / 批次重叠）→ 直接 push 会被拒。
            # 先 rebase 再 push，带重试，避免非 fast-forward 把整批跑批判失败。
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then pushed=true; break; fi
              echo "[commit] push 第 $i 次失败（main 可能已推进），rebase 后重试…"; sleep 5
            done
            if [ "$pushed" != true ]; then echo "[commit] 重试后仍无法 push"; exit 1; fi
            [ "$CONTENT" = "true" ] || echo "[commit] 仅哨兵 health 数据变化 → committed=false（不构建）"
            echo "committed=$CONTENT" >> $GITHUB_OUTPUT
          fi

      # Bark 推送：每次定时抓取后都通知结果。新增内容→📰 有声+标题；无新内容→📭 静默(passive)。
      # 通过 bark_push() 统一发送：回显 HTTP 码 + Bark 返回体，非 200 自动重试 3 次（消除"发失败看不见"盲区）。
      - name: Bark 通知（每次抓取结果）
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success()
        continue-on-error: true   # Bark 抖动永不拖垮跑批/部署
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
        run: |
          [ -z "$BARK_KEY" ] && { echo "[bark] BARK_KEY 为空，跳过"; exit 0; }
          # $1=title $2=body $3=level。GitHub→api.day.app 偶发超时(curl 28)，故：
          #  · curl 用 `|| echo 000` 兜底——失败也不让赋值在 set -e 下中断脚本（这正是上次崩的原因）
          #  · 连超时拆分(connect 10s / 总 25s)，重试 4 次、间隔 5s，提高在抖动窗口内打通的概率
          bark_push() {
            local i code
            for i in 1 2 3 4; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 25 \
                -X POST "https://api.day.app/${BARK_KEY}" \
                --data-urlencode "title=$1" --data-urlencode "body=$2" \
                --data-urlencode "group=CyberFocus" --data-urlencode "level=$3" || echo "000")
              echo "[bark] 第 $i 次 HTTP=$code"
              if [ "$code" = "200" ]; then return 0; fi
              sleep 5
            done
            echo "[bark] ⚠️ 4 次仍未送达（最后 HTTP=$code）"
            return 0
          }
          TS="$(TZ=Asia/Shanghai date '+%m-%d %H:%M')"
          if [ "$COMMITTED" = "true" ]; then
            # 共享摘要脚本：第 1 行=标题，其余=正文（头条一句话简介 + 几条标题）。与 Web Push 同源。
            OUT=$(node scripts/build-push-digest.js 2>/dev/null)
            TITLE=$(printf '%s' "$OUT" | head -1)
            BODY=$(printf '%s' "$OUT" | tail -n +2)
            [ -z "$TITLE" ] && TITLE="📰 CyberFocus 已更新"
            [ -z "$BODY" ]  && BODY="${TS} 今日 AI 精华已就绪，点开看看"
            bark_push "$TITLE" "$BODY" "active"
          else
            bark_push "📭 CyberFocus 本次无新内容" "${TS} 抓取完成，暂无新内容" "passive"
          fi

      # Web Push：有新内容时给 iOS PWA 订阅者推一条（走 APNs，国内可达）。未配 VAPID/KV 则脚本自动跳过。
      - name: 发送 Web Push（有新内容时）
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success() && steps.commit.outputs.committed == 'true'
        continue-on-error: true
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          # 共享摘要脚本（与 Bark 同源）：第 1 行=标题，其余=正文（头条一句话简介 + 几条标题）。
          OUT=$(node scripts/build-push-digest.js 2>/dev/null)
          PUSH_TITLE=$(printf '%s' "$OUT" | head -1)
          PUSH_BODY=$(printf '%s' "$OUT" | tail -n +2)
          [ -z "$PUSH_TITLE" ] && PUSH_TITLE="📰 CyberFocus 已更新"
          [ -z "$PUSH_BODY" ]  && PUSH_BODY="今日 AI 精华已就绪，点开看看"
          export PUSH_TITLE PUSH_BODY
          export PUSH_URL="/reports"
          node scripts/send-push.js || true

      - name: Bark 失败告警
        if: github.event_name == 'schedule' && failure()
        continue-on-error: true
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          [ -z "$BARK_KEY" ] && exit 0
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 25 \
              -X POST "https://api.day.app/${BARK_KEY}" \
              --data-urlencode "title=⚠️ CyberFocus 云端跑批失败" \
              --data-urlencode "body=$(TZ=Asia/Shanghai date '+%m-%d %H:%M') GitHub Actions 跑批失败，请看 Actions 日志" \
              --data-urlencode "group=CyberFocus" \
              --data-urlencode "level=timeSensitive" || echo "000")
            echo "[bark] 失败告警 第 $i 次 HTTP=$code"
            if [ "$code" = "200" ]; then break; fi
            sleep 5
          done

      # 仅在「有新内容(committed) / push 代码 / 手动」时才构建并部署 Pages，
      # 日内无新内容的批次跳过，避免每 3 小时白白构建。（Vercel 由 push 自动部署，独立于此。）
      - name: Setup Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/configure-pages@v5

      - name: Build Next.js
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        # 静态导出(output:export)不支持动态路由——删掉只在 Vercel 运行的 push 接口再打包。
        # （仅删 CI 工作区，不影响仓库；Vercel 用自己的 server-mode 构建，照常保留这些接口。）
        run: |
          rm -rf app/api/push
          npx next build --webpack
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/deploy-pages@v4
