name: Update Papers & Deploy

on:
  # 云端是唯一跑批者（本地 launchd 已停用）。白天每 3 小时抓一次。北京 = UTC+8。
  # GitHub 定时常漂移 1~2.5h、偶尔丢批，所以晨跑「提前 + 双批兜底」，确保 8 点前就绪：
  #   即便主批漂 +2h 也在 06:00 前跑完；主批被丢弃还有 05:00 那批补上。
  schedule:
    - cron: '0 20 * * *'            # 04:00 北京 — 晨跑主批（提前，留足 cron 漂移余量）
    - cron: '0 21 * * *'            # 05:00 北京 — 晨跑兜底（主批被丢弃/严重延迟时补上）
    - cron: '12 1,4,7,10,13 * * *'  # 09:12/12:12/15:12/18:12/21:12 北京 — 日内每 3 小时补抓
  # Triggered automatically when data or app code changes
  push:
    branches: [main]
    paths:
      - 'data/articles.json'
      - 'data/processed-ids.json'
      - 'data/daily/**'
      - 'data/podcasts.json'
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.*'
  # Manual trigger
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: 'Run fetch+translate pipeline (set false to build only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 每个定时批次都抓取（去重靠 processed-ids；下面只在有新内容时才提交+构建）。
      - name: Run fetch + translate pipeline
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          # DeepSeek 优先（需仓库 Secret DEEPSEEK_API_KEY），未配则退回 ANTHROPIC。
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline.js

      - name: Run podcast pipeline
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/podcast-pipeline.js || true

      # 4 个投资报告（脚本自身按节奏 gate：策略快报每2天 / 周报周六 / 季度宏观季首 / 行业深度月首）
      - name: Run investing reports (self-gated)
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/strategy-brief.js  || true
          node scripts/weekly-review.js   || true
          node scripts/quarterly-macro.js || true
          node scripts/sector-deep-dive.js || true

      # 只在有新内容时提交+推送（→ Vercel 自动部署）。committed 输出决定下面要不要构建 Pages。
      # 手动触发(run_pipeline=true)也提交，否则抓到的数据被丢弃、Vercel 收不到。
      - name: Commit updated data
        id: commit
        if: github.event_name == 'schedule' || github.event.inputs.run_pipeline == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "[commit] 无新内容，跳过提交与构建"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git add data/articles.json data/processed-ids.json data/sources.json data/daily/ data/podcasts.json data/strategy-briefs/ data/weekly-reports/ data/sector-reports/ data/macro-reports/
            git commit -m "chore: update $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            # 跑批期间 main 可能被其它提交推进（手动推送 / 批次重叠）→ 直接 push 会被拒。
            # 先 rebase 再 push，带重试，避免非 fast-forward 把整批跑批判失败。
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then pushed=true; break; fi
              echo "[commit] push 第 $i 次失败（main 可能已推进），rebase 后重试…"; sleep 5
            done
            if [ "$pushed" != true ]; then echo "[commit] 重试后仍无法 push"; exit 1; fi
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      # Bark 推送：每次定时抓取后都通知结果。新增内容→📰 有声+标题；无新内容→📭 静默(passive)。
      - name: Bark 通知（每次抓取结果）
        if: github.event_name == 'schedule' && success()
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
        run: |
          [ -z "$BARK_KEY" ] && exit 0
          TS="$(TZ=Asia/Shanghai date '+%m-%d %H:%M')"
          if [ "$COMMITTED" = "true" ]; then
            OUT=$(node -e '
              try {
                const A = require("./data/articles.json");
                const cut = new Date(Date.now() - 3.5 * 3600 * 1000).toISOString();
                const HV = new Set(["Anthropic Blog","Claude Blog","OpenAI Blog","DeepMind Blog","Google DeepMind","NVIDIA Blog"]);
                const f = A.filter(a => a.fetchedAt && a.fetchedAt > cut);
                f.sort((x,y) => (HV.has(x.source)?0:1)-(HV.has(y.source)?0:1) || String(y.publishedAt).localeCompare(String(x.publishedAt)));
                console.log(f.length);
                console.log(f.slice(0,6).map(a => "• " + String(a.titleZh||a.titleEn||"").slice(0,34)).join("\n"));
              } catch { console.log("0"); }
            ' 2>/dev/null)
            N=$(printf '%s' "$OUT" | head -1)
            LINES=$(printf '%s' "$OUT" | tail -n +2)
            BODY=$(printf "%s · 新增 %s 条\n%s" "$TS" "$N" "$LINES")
            curl -s --max-time 12 -X POST "https://api.day.app/${BARK_KEY}" \
              --data-urlencode "title=📰 CyberFocus 已更新" \
              --data-urlencode "body=${BODY}" \
              --data-urlencode "group=CyberFocus" \
              --data-urlencode "level=active" || true
          else
            curl -s --max-time 12 -X POST "https://api.day.app/${BARK_KEY}" \
              --data-urlencode "title=📭 CyberFocus 本次无新内容" \
              --data-urlencode "body=${TS} 抓取完成，暂无新内容" \
              --data-urlencode "group=CyberFocus" \
              --data-urlencode "level=passive" || true
          fi

      - name: Bark 失败告警
        if: github.event_name == 'schedule' && failure()
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          [ -z "$BARK_KEY" ] && exit 0
          curl -s --max-time 12 -X POST "https://api.day.app/${BARK_KEY}" \
            --data-urlencode "title=⚠️ CyberFocus 云端跑批失败" \
            --data-urlencode "body=$(TZ=Asia/Shanghai date '+%m-%d %H:%M') GitHub Actions 跑批失败，请看 Actions 日志" \
            --data-urlencode "group=CyberFocus" \
            --data-urlencode "level=timeSensitive" || true

      # 仅在「有新内容(committed) / push 代码 / 手动」时才构建并部署 Pages，
      # 日内无新内容的批次跳过，避免每 3 小时白白构建。（Vercel 由 push 自动部署，独立于此。）
      - name: Setup Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/configure-pages@v4

      - name: Build Next.js
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        run: npx next build --webpack
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.commit.outputs.committed == 'true'
        uses: actions/deploy-pages@v4
